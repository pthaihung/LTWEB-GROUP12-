<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Navbar</title>

<style>

.navbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
}

.menu{
    display: flex;
    list-style: none;
    gap: 30px;
}

.actions{
    display: flex;
    gap: 10px;
}
.actions button{
    padding: 8px 16px;
    border: none;
    cursor: pointer;
}

.btn-white{
    background: white;
    color: hsl(258, 88%, 47%);
    border: 1px solid #007bff;
}

.btn-blue{
    background: hsl(258, 88%, 47%);
    color: white;
    border: none;
    border-radius: 18%;
}

.logo img{
    height: 50px;
}
</style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        <img src = "https://vanphongxanh.vn/wp-content/uploads/2022/03/logo-social.png" alt = logo>
    </div>

    <ul class="menu">
        <li><b>Dịch vụ</b></li>
        <li><b>Sản phẩm</b></li>
        <li><b>Tin tức</b></li>
        <li><b>Hỗ trợ</b></li>
        <li><b>Giới thiệu</b></li>
    </ul>

    <div class="actions">
        <button class ="btn-white"><b>button</b></button>
        <button class ="btn-blue"><b>button</b></button>
    </div>

</nav>

</body>
</html>
