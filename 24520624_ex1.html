<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Exercise 1</title>
</head>

<body>

<h2>Exercise 1</h2>

<button onclick="showAgent()">Click Button</button>

<p id="result"></p>

<script>

function showAgent() {
    let random = Math.random() < 0.5;
    if(random){
        alert("Alert!");
    }
    let agent = navigator.userAgent;

    document.getElementById("result").innerHTML =
        "Browser Agent: " + agent;
}

</script>

</body>
</html>
